<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f2f5}
body{display:flex;align-items:center;justify-content:center}
.card{width:calc(100% - 24px);max-width:380px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.card-top{background:linear-gradient(135deg,#f5c400 0%,#b8960c 100%);padding:18px;display:flex;align-items:center;gap:14px}
.logo-circle{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:2px}
.team-name{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.card-body{padding:14px 16px}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:#f8f9fa}
.member-row:last-child{margin:0}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f5c400,#b8960c);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mname{font-size:12px;font-weight:500;color:#323130}
.num{margin-left:auto;font-size:10px;color:#aaa;background:#efefef;padding:2px 7px;border-radius:99px}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-circle">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <polygon points="18,6 21,14 8,14 11,24 25,24 28,14 15,14" fill="#fff" opacity=".9"/>
        <rect x="11" y="24" width="14" height="3" rx="1" fill="rgba(255,255,255,0.6)"/>
        <circle cx="18" cy="11" r="2" fill="rgba(245,196,0,0.8)"/>
        <circle cx="10" cy="14" r="2" fill="rgba(245,196,0,0.8)"/>
        <circle cx="26" cy="14" r="2" fill="rgba(245,196,0,0.8)"/>
      </svg>
    </div>
    <div>
      <div class="team-label">Team</div>
      <div class="team-name">Test Kings</div>
    </div>
  </div>
  <div class="card-body">
    <div class="member-row"><div class="av">HA</div><span class="mname">Henrik Andersen</span><span class="num">#1</span></div>
    <div class="member-row"><div class="av">MW</div><span class="mname">Marcin Woźniak</span><span class="num">#2</span></div>
    <div class="member-row"><div class="av">MS</div><span class="mname">Marcin Szopa</span><span class="num">#3</span></div>
  </div>
</div>
</body>
</html>
