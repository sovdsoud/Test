<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f2f5}
body{display:flex;align-items:center;justify-content:center}
.card{width:calc(100% - 24px);max-width:380px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.card-top{background:linear-gradient(135deg,#b44fff 0%,#6b1cb0 100%);padding:18px;display:flex;align-items:center;gap:14px}
.logo-circle{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:2px}
.team-name{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.card-body{padding:14px 16px}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:#f8f9fa}
.member-row:last-child{margin:0}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#b44fff,#6b1cb0);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mname{font-size:12px;font-weight:500;color:#323130}
.num{margin-left:auto;font-size:10px;color:#aaa;background:#efefef;padding:2px 7px;border-radius:99px}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-circle">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <circle cx="9" cy="18" r="4" fill="#fff" opacity=".9"/>
        <circle cx="27" cy="18" r="4" fill="#fff" opacity=".9"/>
        <circle cx="18" cy="9" r="4" fill="#fff" opacity=".9"/>
        <circle cx="18" cy="27" r="4" fill="#fff" opacity=".9"/>
        <line x1="13" y1="18" x2="23" y2="18" stroke="#fff" stroke-width="2"/>
        <line x1="18" y1="13" x2="18" y2="23" stroke="#fff" stroke-width="2"/>
        <line x1="12" y1="12" x2="24" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="24" y1="12" x2="12" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <circle cx="18" cy="18" r="3" fill="rgba(180,79,255,0.6)" stroke="#fff" stroke-width="1"/>
      </svg>
    </div>
    <div>
      <div class="team-label">Team</div>
      <div class="team-name">The Connectors</div>
    </div>
  </div>
  <div class="card-body">
    <div class="member-row"><div class="av">JP</div><span class="mname">Jason Pineda</span><span class="num">#1</span></div>
    <div class="member-row"><div class="av">SD</div><span class="mname">Sourav Das</span><span class="num">#2</span></div>
    <div class="member-row"><div class="av">AJ</div><span class="mname">Agnieszka Jagodzińska</span><span class="num">#3</span></div>
  </div>
</div>
</body>
</html>
