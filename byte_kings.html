<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f2f5}
body{display:flex;align-items:center;justify-content:center}
.card{width:calc(100% - 24px);max-width:380px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.card-top{background:linear-gradient(135deg,#00b8d4 0%,#007a8c 100%);padding:18px;display:flex;align-items:center;gap:14px}
.logo-circle{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:2px}
.team-name{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.card-body{padding:14px 16px}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:#f8f9fa}
.member-row:last-child{margin:0}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00b8d4,#007a8c);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mname{font-size:12px;font-weight:500;color:#323130}
.num{margin-left:auto;font-size:10px;color:#aaa;background:#efefef;padding:2px 7px;border-radius:99px}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-circle">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <rect x="8" y="12" width="20" height="14" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
        <rect x="13" y="8" width="10" height="6" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
        <line x1="12" y1="19" x2="24" y2="19" stroke="#fff" stroke-width="1.5"/>
        <line x1="12" y1="22" x2="19" y2="22" stroke="#fff" stroke-width="1.5"/>
        <circle cx="26" cy="13" r="3" fill="rgba(0,184,212,0.6)" stroke="#fff" stroke-width="1.2"/>
      </svg>
    </div>
    <div>
      <div class="team-label">Team</div>
      <div class="team-name">Byte Knights</div>
    </div>
  </div>
  <div class="card-body">
    <div class="member-row"><div class="av">KR</div><span class="mname">Krzysztof Raczkowski</span><span class="num">#1</span></div>
    <div class="member-row"><div class="av">TT</div><span class="mname">Tomasz Trzpil</span><span class="num">#2</span></div>
    <div class="member-row"><div class="av">PL</div><span class="mname">Piotr Ludwiczuk</span><span class="num">#3</span></div>
  </div>
</div>
</body>
</html>
