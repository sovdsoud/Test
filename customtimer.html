<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
html,body{width:100%;height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;background:#0a0a1a}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 24px;text-align:center;min-width:280px}
.event-name{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:4px}
.event-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:2px}
.event-date{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:16px}
.timer-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.time-block{display:flex;flex-direction:column;align-items:center}
.time-val{font-size:42px;font-weight:900;color:#fff;line-height:1;min-width:64px;background:rgba(255,255,255,0.08);border-radius:8px;padding:6px 10px;border:1px solid rgba(255,255,255,0.1)}
.time-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-top:4px;text-transform:uppercase}
.sep{font-size:36px;font-weight:900;color:rgba(255,255,255,0.3);margin-bottom:16px}
.status{font-size:11px;padding:4px 12px;border-radius:99px;display:inline-block;margin-top:4px}
.status.live{background:rgba(34,197,94,0.2);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.status.soon{background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.status.ended{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.progress-wrap{background:rgba(255,255,255,0.08);border-radius:99px;height:4px;margin-top:12px;overflow:hidden}
.progress-bar{height:4px;border-radius:99px;background:linear-gradient(90deg,#7c3aed,#a78bfa);transition:width 1s linear}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="event-name">TestFest Connectivity</div>
  <div class="event-title">⚡ Event Countdown</div>
  <div class="event-date">30th April 2026 · 10:00 AM</div>
  <div class="timer-row">
    <div class="time-block"><div class="time-val" id="days">00</div><div class="time-label">Days</div></div>
    <div class="sep">:</div>
    <div class="time-block"><div class="time-val" id="hours">00</div><div class="time-label">Hours</div></div>
    <div class="sep">:</div>
    <div class="time-block"><div class="time-val" id="mins">00</div><div class="time-label">Mins</div></div>
    <div class="sep">:</div>
    <div class="time-block"><div class="time-val" id="secs">00</div><div class="time-label">Secs</div></div>
  </div>
  <div id="status" class="status soon">⏳ Starting soon</div>
  <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:0%"></div></div>
</div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
resize();window.onresize=resize;
const stars=Array.from({length:80},()=>({
  x:Math.random(),y:Math.random(),r:Math.random()*1.2+.2,
  o:Math.random()*.5+.1,s:Math.random()*.002+.001
}));
function drawStars(){
  x.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    s.o+=s.s*(Math.random()>.5?1:-1);
    s.o=Math.max(.05,Math.min(.6,s.o));
    x.beginPath();x.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
    x.fillStyle=`rgba(167,139,250,${s.o})`;x.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// Event start and end times — 30 April 2026 10:00 AM to 4:00 PM
const eventStart=new Date('2026-04-30T10:00:00');
const eventEnd=new Date('2026-04-30T16:00:00');
const totalDuration=eventEnd-eventStart;

function pad(n){return String(n).padStart(2,'0')}

function tick(){
  const now=new Date();
  const status=document.getElementById('status');
  const prog=document.getElementById('prog');

  let target,diff;

  if(now<eventStart){
    // Counting down to start
    diff=eventStart-now;
    status.className='status soon';
    status.textContent='⏳ Event starting soon';
    prog.style.width='0%';
  } else if(now>=eventStart && now<eventEnd){
    // Event is live — count down to end
    diff=eventEnd-now;
    status.className='status live';
    status.textContent='🟢 Event is LIVE';
    const elapsed=now-eventStart;
    prog.style.width=Math.min(100,Math.round((elapsed/totalDuration)*100))+'%';
  } else {
    // Event ended
    diff=0;
    status.className='status ended';
    status.textContent='🏁 Event has ended';
    prog.style.width='100%';
  }

  const days=Math.floor(diff/86400000);
  const hours=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  const secs=Math.floor((diff%60000)/1000);

  document.getElementById('days').textContent=pad(days);
  document.getElementById('hours').textContent=pad(hours);
  document.getElementById('mins').textContent=pad(mins);
  document.getElementById('secs').textContent=pad(secs);
}

tick();
setInterval(tick,1000);
</script>
</body>
</html>
