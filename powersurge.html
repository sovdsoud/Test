<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:#fff;padding:12px;height:100vh;display:flex;align-items:center}
.card{display:flex;align-items:center;gap:12px;border-left:4px solid #ff5555;padding-left:12px;width:100%}
.logo{width:58px;height:58px;border-radius:50%;background:#fff0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #ffcccc}
.tname{font-size:14px;font-weight:700;color:#cc2222;margin-bottom:7px}
.members{display:flex;flex-direction:column;gap:4px}
.m{display:flex;align-items:center;gap:7px;font-size:12px;color:#444}
.av{width:22px;height:22px;border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#ff5555}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="#ff5555" opacity=".15"/>
      <polygon points="20,4 24,16 37,16 27,24 31,36 20,28 9,36 13,24 3,16 16,16" fill="#ff5555"/>
      <circle cx="20" cy="20" r="5" fill="#fff"/>
      <text x="20" y="23" text-anchor="middle" font-size="5" font-weight="700" fill="#ff5555">PPS</text>
    </svg>
  </div>
  <div>
    <div class="tname">Polish Power Surge</div>
    <div class="members">
      <div class="m"><div class="av">TM</div>Tomasz Mierzejewski</div>
      <div class="m"><div class="av">RG</div>Rafał Grzybowski</div>
      <div class="m"><div class="av">MR</div>Marcin Rutkowski</div>
    </div>
  </div>
</div>
</body>
</html>
