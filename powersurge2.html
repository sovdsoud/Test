<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f2f5}
body{display:flex;align-items:center;justify-content:center}
.card{width:calc(100% - 24px);max-width:380px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.card-top{background:linear-gradient(135deg,#ff5555 0%,#c0182a 100%);padding:18px;display:flex;align-items:center;gap:14px}
.logo-circle{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:2px}
.team-name{font-size:18px;font-weight:800;color:#fff;line-height:1.1}
.card-body{padding:14px 16px}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:#f8f9fa;transition:background .15s}
.member-row:last-child{margin:0}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff5555,#c0182a);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mname{font-size:12px;font-weight:500;color:#323130}
.num{margin-left:auto;font-size:10px;color:#aaa;background:#efefef;padding:2px 7px;border-radius:99px}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-circle">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <polygon points="18,2 22,13 34,13 25,20 28,32 18,25 8,32 11,20 2,13 14,13" fill="#fff" opacity=".9"/>
        <circle cx="18" cy="18" r="4" fill="rgba(255,85,85,0.8)"/>
      </svg>
    </div>
    <div>
      <div class="team-label">Team</div>
      <div class="team-name">Polish Power Surge</div>
    </div>
  </div>
  <div class="card-body">
    <div class="member-row"><div class="av">TM</div><span class="mname">Tomasz Mierzejewski</span><span class="num">#1</span></div>
    <div class="member-row"><div class="av">RG</div><span class="mname">Rafał Grzybowski</span><span class="num">#2</span></div>
    <div class="member-row"><div class="av">MR</div><span class="mname">Marcin Rutkowski</span><span class="num">#3</span></div>
  </div>
</div>
</body>
</html>
